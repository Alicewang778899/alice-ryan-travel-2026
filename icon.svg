<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="coin" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFF0A0"/>
      <stop offset="25%"  stop-color="#F4C200"/>
      <stop offset="60%"  stop-color="#C8900C"/>
      <stop offset="100%" stop-color="#7A5000"/>
    </radialGradient>
    <radialGradient id="teal1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3DB89E"/>
      <stop offset="100%" stop-color="#1A6B5A"/>
    </radialGradient>
    <radialGradient id="orange1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F5A830"/>
      <stop offset="100%" stop-color="#C06810"/>
    </radialGradient>
    <radialGradient id="glass" cx="32%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="40%"  stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </radialGradient>
    <radialGradient id="glassbg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0D1B2E"/>

  <!-- Teal blobs -->
  <circle cx="-10" cy="120"  r="170" fill="url(#teal1)"   opacity="0.9" clip-path="url(#round)"/>
  <circle cx="390" cy="30"   r="115" fill="url(#teal1)"   opacity="0.8" clip-path="url(#round)"/>
  <circle cx="360" cy="490"  r="145" fill="url(#teal1)"   opacity="0.8" clip-path="url(#round)"/>
  <circle cx="60"  cy="410"  r="80"  fill="url(#teal1)"   opacity="0.55" clip-path="url(#round)"/>

  <!-- Orange blobs -->
  <circle cx="490" cy="220"  r="155" fill="url(#orange1)" opacity="0.9" clip-path="url(#round)"/>
  <circle cx="110" cy="490"  r="130" fill="url(#orange1)" opacity="0.8" clip-path="url(#round)"/>
  <circle cx="220" cy="-15"  r="100" fill="url(#orange1)" opacity="0.65" clip-path="url(#round)"/>

  <!-- Glass bubble shadow -->
  <circle cx="262" cy="264" r="198" fill="rgba(0,0,0,0.25)" filter="url(#soft)"/>

  <!-- Glass bubble body -->
  <circle cx="256" cy="256" r="195" fill="url(#glassbg)" stroke="rgba(255,255,255,0.22)" stroke-width="2.5"/>

  <!-- Gold coin base -->
  <circle cx="256" cy="256" r="152" fill="url(#coin)"/>

  <!-- Coin inner ring -->
  <circle cx="256" cy="256" r="142" fill="none" stroke="rgba(255,200,50,0.45)" stroke-width="3"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="rgba(200,140,0,0.3)"  stroke-width="1.5"/>

  <!-- Coin surface shadow (bottom-right) -->
  <circle cx="272" cy="272" r="152" fill="rgba(100,50,0,0.18)"/>

  <!-- A&R shadow layer -->
  <text x="260" y="290"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="122" font-weight="bold"
    fill="rgba(80,40,0,0.5)"
    text-anchor="middle">A&amp;R</text>

  <!-- A&R main gold text -->
  <text x="256" y="286"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="122" font-weight="bold"
    fill="#FFF0A0"
    text-anchor="middle">A&amp;R</text>

  <!-- Coin shine arc (top-left highlight) -->
  <path d="M 138 205 Q 175 132 258 118 Q 308 112 348 148"
    fill="none" stroke="rgba(255,255,255,0.4)"
    stroke-width="14" stroke-linecap="round"/>

  <!-- Glass highlight overlay -->
  <circle cx="256" cy="256" r="195" fill="url(#glass)" opacity="0.6"/>

  <!-- Glass rim top arc -->
  <path d="M 88 188 Q 256 65 424 188"
    fill="none" stroke="rgba(255,255,255,0.28)"
    stroke-width="7" stroke-linecap="round"/>

  <!-- Glass rim small left sparkle -->
  <circle cx="96" cy="196" r="5" fill="rgba(255,255,255,0.6)"/>
</svg>
